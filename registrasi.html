<!DOCTYPE html>
<html>
<head>
    <title>Form Registrasi</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #597794;
        }

        .container {
            width: 400px;
            margin: 80px auto;
            padding: 40px;
            background-color: #b5c4cb;
            border-radius: 8px;
            box-shadow: 0px 0px 10px gray;
        }

        h2 {
            text-align: center;
        }

        input[type="text"],
        input[type="password"],
        input[type="email"] {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
        }

        input[type="submit"] {
            width: 105%;
            padding: 8px;
            background-color: #35474f;
            color: white;
            border: none;
            cursor: pointer;
        }

        .link {
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Form Registrasi</h2>
    <form>
        <label>Nama Lengkap</label>
        <input type="text" name="nama" required>

        <label>Email</label>
        <input type="email" name="email" required>

        <label>Username</label>
        <input type="text" name="username" required>

        <label>Password</label>
        <input type="password" name="password" required>

        <input type="submit" value="Daftar">
    </form>

    <div class="link">
        Sudah punya akun? <a href="index.html">Login di sini</a>
    </div>
</div>

</body>
</html>
