<!DOCTYPE html>
<html>
<head>
    <title>Form Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #037d66;
        }

        .container {
            width: 350px;
            margin: 100px auto;
            padding: 20px;
            background-color: #b3d8d1;
            border-radius: 8px;
            box-shadow: 0px 0px 10px gray;
        }

        h2 {
            text-align: center;
        }

        input[type="text"],
        input[type="password"] {
            width: 95%;
            padding: 8px;
            margin: 8px 0;
        }

        input[type="submit"] {
            width: 100%;
            padding: 10px;
            background-color: #093027;
            color: white;
            border: none;
            cursor: pointer;
        }

        .link {
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Form Login</h2>
    <form>
        <label>Username</label>
        <input type="text" name="username" required>

        <label>Password</label>
        <input type="password" name="password" required>

        <input type="submit" value="Login">
    </form>

    <div class="link">
        Belum punya akun? <a href="registrasi.html">Daftar di sini</a>
    </div>
</div>

</body>

</html>
